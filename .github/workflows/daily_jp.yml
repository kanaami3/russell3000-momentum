name: Daily JP (TSE Prime) Momentum Update

on:
  schedule:
    # 日本市場終値 (15:00 JST = 06:00 UTC) 後 → 08:00 UTC = 17:00 JST
    - cron: "0 8 * * 1-5"
    # 予備: GitHub が上の予約をドロップした場合の保険 → 08:40 UTC = 17:40 JST
    # (当日分が既に生成済みなら AI ステップは自動スキップ — 二重課金なし)
    - cron: "40 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch JP universe (TSE Prime constituents from JPX)
        run: python batch/fetch_universe_jp.py

      - name: Fetch JP prices (yfinance, ~14 months daily)
        run: python batch/fetch_prices.py jp

      - name: Compute JP momentum metrics
        run: python batch/calc_momentum.py jp

      - name: Simulate AI paper-trading portfolio
        run: python batch/trade_simulator.py

      # If today's reflection already matches the simulated day, this is a
      # backup run — skip the (paid) Claude steps. Otherwise generate them.
      - name: Check if AI already generated for today
        id: freshness
        run: |
          NEED=$(python3 -c "
          import json
          try:
              p = json.load(open('web/data/portfolio_jp.json'))
              today = p.get('last_simulated_date')
              r = json.load(open('web/data/reflections_jp.json'))
              latest = (r.get('reflections') or [{}])[0].get('date')
              print('false' if latest == today and today else 'true')
          except Exception:
              print('true')
          ")
          echo "need_ai=$NEED" >> "$GITHUB_OUTPUT"
          echo "AI generation needed: $NEED"

      - name: Generate daily reflection (Claude)
        if: steps.freshness.outputs.need_ai == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python batch/generate_daily_reflection.py
          else
            echo "ANTHROPIC_API_KEY not set — skipping reflection"
          fi

      - name: Generate AI swing picks (JP, Claude)
        if: steps.freshness.outputs.need_ai == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python batch/generate_swing_picks.py jp
          else
            echo "ANTHROPIC_API_KEY not set — skipping swing picks"
          fi

      - name: Generate JP market summary (Claude)
        if: steps.freshness.outputs.need_ai == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python batch/generate_summary.py jp
          else
            echo "ANTHROPIC_API_KEY not set — skipping summary generation"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add data/universe_jp.json web/data/momentum_jp.json web/data/chart_data_jp.json web/data/portfolio_jp.json web/data/swing_picks_jp.json web/data/reflections_jp.json
          if git diff --cached --quiet; then
            echo "No JP changes to commit"
          else
            git commit -m "data(jp): daily update $(date -u +%Y-%m-%d)"
            git push
          fi
