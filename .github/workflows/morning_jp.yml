name: Morning JP Daytrade Brief

on:
  schedule:
    # 8:00 JST = 23:00 UTC previous-day, runs Sun-Thu UTC = Mon-Fri JST
    - cron: "0 23 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch JP universe (Prime market)
        run: python batch/fetch_universe_jp.py

      - name: Fetch JP prices (yfinance OHLCV)
        run: python batch/fetch_prices.py jp

      - name: Build morning brief (picks + overnight signals)
        run: python batch/build_morning_brief.py

      - name: Generate AI morning brief (Claude)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python batch/generate_morning_brief_ai.py
          else
            echo "ANTHROPIC_API_KEY not set — skipping AI brief"
          fi

      - name: Compute JP momentum + chart data (for divergence detection)
        run: python batch/calc_momentum.py jp

      - name: Generate per-stock 塾長 commentary (JP, Claude)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python batch/generate_stock_commentary.py jp
          else
            echo "ANTHROPIC_API_KEY not set — skipping stock commentary"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add data/universe_jp.json web/data/morning_brief_jp.json web/data/stock_commentary_jp.json web/data/momentum_jp.json web/data/chart_data_jp.json
          if git diff --cached --quiet; then
            echo "No morning brief changes to commit"
          else
            git commit -m "data(jp morning): daytrade brief $(date -u +%Y-%m-%d)"
            git push
          fi
