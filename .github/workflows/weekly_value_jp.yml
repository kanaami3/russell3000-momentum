name: Daily JP Value Investing Screen (weekdays)

on:
  schedule:
    # 平日毎日 21:00 JST = 12:00 UTC(東証クローズ後・翌寄付前に更新)
    - cron: "0 12 * * 1-5"
    # 予備: GitHub が上の予約をドロップした場合の保険 → 12:40 UTC = 21:40 JST
    # (当日分が既に生成済みなら全ステップを自動スキップ — 二重課金なし)
    - cron: "40 12 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  value:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # If value_jp.json was generated < 6h ago, this is a backup run after a
      # successful primary — skip the whole (paid) pipeline.
      - name: Check if value screen already fresh today
        id: freshness
        run: |
          NEED=$(python3 -c "
          import json
          from datetime import datetime
          try:
              v = json.load(open('web/data/value_jp.json'))
              gen = datetime.fromisoformat(v['generated_at_jst'])
              now = datetime.now(gen.tzinfo)
              age_h = (now - gen).total_seconds() / 3600
              print('false' if age_h < 6 else 'true')
          except Exception:
              print('true')
          ")
          echo "need_run=$NEED" >> "$GITHUB_OUTPUT"
          echo "Value screen run needed: $NEED"

      - name: Fetch JP universe (Prime market)
        if: steps.freshness.outputs.need_run == 'true'
        run: python batch/fetch_universe_jp.py

      - name: Fetch fundamentals (yfinance Ticker.info)
        if: steps.freshness.outputs.need_run == 'true'
        run: python batch/fetch_value_data.py

      - name: Compute value rankings (6 categories)
        if: steps.freshness.outputs.need_run == 'true'
        run: python batch/calc_value_rankings.py

      - name: Generate AI commentary + AI picks (Claude)
        if: steps.freshness.outputs.need_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python batch/generate_value_commentary.py
          else
            echo "ANTHROPIC_API_KEY not set — skipping value commentary"
          fi

      - name: Commit and push
        if: steps.freshness.outputs.need_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add data/universe_jp.json web/data/value_jp.json
          if git diff --cached --quiet; then
            echo "No value-screen changes to commit"
          else
            git commit -m "data(jp value): daily update $(date -u +%Y-%m-%d)"
            git push
          fi

      # 1日1回の統合ダイジェスト(指数 + バリュー + デイトレ大引け)を送信。
      # この時刻には当日の指数(07:30)・大引け(17:00)・バリュー(21:00)が
      # 全て揃っている。最新データを pull してから送る。
      - name: Notify Discord (本日のまとめ・統合ダイジェスト)
        if: steps.freshness.outputs.need_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git pull --rebase --autostash origin main || true
          python batch/notify_discord.py daily_digest || true
