<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | 塾長秘書 AI投資ナビ</title>
<meta name="robots" content="noindex, nofollow" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; }
  .gradient-bg {
    background: linear-gradient(135deg, #d97706 0%, #4f46e5 50%, #0e7490 100%);
  }
</style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-7 sm:p-9 max-w-md w-full">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">🎯</div>
      <h1 class="text-xl sm:text-2xl font-extrabold text-slate-800">塾長秘書 AI 投資ナビ</h1>
      <p class="text-xs text-slate-500 mt-1">米国・日本株 / バリュー / スウィング / デイトレ</p>
    </div>
    <p class="text-xs text-slate-600 mb-5 bg-amber-50 border border-amber-200 rounded-lg p-3 leading-relaxed">
      塾生専用ページです。塾長から配布された <strong>ログインID と パスワード</strong> を入力してください。
    </p>
    <form action="/api/login" method="POST" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-700 mb-1">ログイン ID</label>
        <input type="text" name="user" required autocomplete="username"
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base" />
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-700 mb-1">パスワード</label>
        <input type="password" name="pass" required autocomplete="current-password"
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base" />
      </div>
      <button type="submit"
              class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-bold py-2.5 rounded-lg transition-colors">
        ログイン
      </button>
    </form>
    <p id="error" class="hidden text-sm text-red-700 mt-4 text-center bg-red-50 border border-red-200 rounded-lg p-2">
      ⚠️ ログインIDまたはパスワードが違います
    </p>
    <p class="text-[11px] text-slate-400 text-center mt-6 leading-relaxed">
      本サイトの情報は投資勧誘ではありません。教育・参考目的のみ。<br>
      投資判断はご自身の責任で行ってください。
    </p>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error').classList.remove('hidden');
    }
  </script>
</body>
</html>
