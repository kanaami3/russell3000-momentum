<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>米国・日本株 モメンタムランキング | Daily Momentum Report</title>
<meta name="description" content="米国ラッセル3000(時価総額上位3000銘柄)と東証プライム全銘柄の日次モメンタムランキング。1週間/1ヶ月/3ヶ月リターン、上昇TOP10、下落ワースト10を毎日自動更新。" />
<meta property="og:title" content="米国・日本株 モメンタムランキング" />
<meta property="og:description" content="米国ラッセル3000と東証プライム全銘柄を日次でモメンタムランク付け。上昇/下落TOP、期間別TOPを自動更新。" />
<meta property="og:type" content="website" />
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; }
  .num { font-variant-numeric: tabular-nums; }
  .gradient-us { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%); }
  .gradient-jp { background: linear-gradient(135deg, #dc2626 0%, #e11d48 50%, #be185d 100%); }
  .ticker-link { cursor: pointer; text-decoration: none; }
  .ticker-link:hover { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
</style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="momentumApp()" x-init="init()">

<!-- Header -->
<header :class="market === 'jp' ? 'gradient-jp text-white' : 'gradient-us text-white'">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-10">
    <div class="text-xs sm:text-sm font-semibold tracking-widest mb-2 opacity-90" x-text="config.label"></div>
    <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight" x-text="config.title"></h1>
    <div class="mt-3 text-sm sm:text-base opacity-90">
      <span x-text="formatDate(data?.asof)"></span>
      <span class="mx-2 opacity-60">|</span>
      <span><span x-text="data?.ticker_count ?? '...'"></span>銘柄対象（自動更新）</span>
    </div>
  </div>
</header>

<!-- Market tabs -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="flex gap-1">
      <button
        @click="setMarket('us')"
        :class="market === 'us' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-800'"
        class="px-4 sm:px-6 py-3 sm:py-4 border-b-2 font-bold text-sm sm:text-base transition-colors">
        🇺🇸 米国 (Russell 3000)
      </button>
      <button
        @click="setMarket('jp')"
        :class="market === 'jp' ? 'border-rose-600 text-rose-700' : 'border-transparent text-slate-500 hover:text-slate-800'"
        class="px-4 sm:px-6 py-3 sm:py-4 border-b-2 font-bold text-sm sm:text-base transition-colors">
        🇯🇵 日本 (東証プライム)
      </button>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-12">

  <div x-show="loading" class="text-center py-20 text-slate-500">データを読み込み中...</div>

  <template x-if="data && !loading">
  <div class="space-y-12">

    <!-- Section 1: Yesterday gainers/losers -->
    <section>
      <h2 class="flex items-center gap-3 text-xl sm:text-2xl font-bold text-slate-800 mb-4">
        <span class="inline-block w-1.5 h-7 rounded" :class="market === 'jp' ? 'bg-rose-600' : 'bg-indigo-600'"></span>
        本日 上昇・下落ランキング
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-green-50 border border-green-200 rounded-xl p-5 shadow-sm">
          <div class="text-sm font-bold text-green-700 mb-3 flex items-center gap-2">
            <span class="inline-block w-2 h-2 bg-green-500 rounded-full"></span>
            本日 上昇 TOP10
          </div>
          <div class="space-y-1.5">
            <template x-for="row in data.yesterday_top10" :key="row.ticker">
              <div class="flex items-center justify-between text-sm py-1 border-b border-green-100 last:border-0">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                  <a class="font-bold text-green-700 w-16 shrink-0 ticker-link" @click="openChart(row.ticker)" x-text="displayTicker(row.ticker)"></a>
                  <span class="text-slate-600 truncate flex-1" x-text="shortName(row.name)"></span>
                  <span class="shrink-0" x-html="sparklineSvg(row.sparkline, 56, 18, '#16a34a')"></span>
                </div>
                <span class="num font-bold text-green-700 ml-2 shrink-0" x-text="fmtPct(row.value)"></span>
              </div>
            </template>
          </div>
        </div>
        <div class="bg-red-50 border border-red-200 rounded-xl p-5 shadow-sm">
          <div class="text-sm font-bold text-red-700 mb-3 flex items-center gap-2">
            <span class="inline-block w-2 h-2 bg-red-500 rounded-full"></span>
            本日 下落 ワースト10
          </div>
          <div class="space-y-1.5">
            <template x-for="row in data.yesterday_worst10" :key="row.ticker">
              <div class="flex items-center justify-between text-sm py-1 border-b border-red-100 last:border-0">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                  <a class="font-bold text-red-700 w-16 shrink-0 ticker-link" @click="openChart(row.ticker)" x-text="displayTicker(row.ticker)"></a>
                  <span class="text-slate-600 truncate flex-1" x-text="shortName(row.name)"></span>
                  <span class="shrink-0" x-html="sparklineSvg(row.sparkline, 56, 18, '#dc2626')"></span>
                </div>
                <span class="num font-bold text-red-700 ml-2 shrink-0" x-text="fmtPct(row.value)"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </section>

    <!-- Section 2: Period momentum -->
    <section>
      <h2 class="flex items-center gap-3 text-xl sm:text-2xl font-bold text-slate-800 mb-4">
        <span class="inline-block w-1.5 h-7 rounded" :class="market === 'jp' ? 'bg-rose-600' : 'bg-indigo-600'"></span>
        期間別 モメンタム TOP10
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <template x-for="panel in periodPanels" :key="panel.key">
          <div :class="panel.bg + ' ' + panel.border + ' border rounded-xl p-5 shadow-sm'">
            <div :class="'text-sm font-bold ' + panel.text + ' mb-3 flex items-center gap-2'">
              <span :class="'inline-block w-2 h-2 ' + panel.dot + ' rounded-full'"></span>
              <span x-text="panel.label"></span> TOP10
            </div>
            <div class="space-y-1.5">
              <template x-for="row in data[panel.key]" :key="row.ticker">
                <div class="flex items-center justify-between text-sm py-1 border-b last:border-0" :class="panel.divider">
                  <a class="font-bold w-16 shrink-0 ticker-link" :class="panel.text" @click="openChart(row.ticker)" x-text="displayTicker(row.ticker)"></a>
                  <span class="shrink-0 flex-1 text-center" x-html="sparklineSvg(row.sparkline, 64, 18, panel.sparkColor)"></span>
                  <span class="num font-bold shrink-0" :class="panel.text" x-text="fmtPct(row.value)"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
      <div class="mt-3 text-xs text-slate-500 leading-relaxed">
        ※ <span class="font-semibold">12-1モメンタム</span>(12ヶ月リターン - 直近1ヶ月リターン)もアカデミック標準として参考に提供しています。
      </div>
      <details class="mt-3 bg-white border border-slate-200 rounded-xl shadow-sm">
        <summary class="cursor-pointer px-5 py-3 text-sm font-bold text-slate-700">
          12-1モメンタム TOP10(参考)
        </summary>
        <div class="px-5 pb-4 grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1.5">
          <template x-for="row in data.mom_12_1_top10" :key="row.ticker">
            <div class="flex items-center justify-between text-sm py-1 border-b border-slate-100">
              <div class="flex items-center gap-3 min-w-0 flex-1">
                <a class="font-bold w-16 shrink-0 ticker-link" :class="market === 'jp' ? 'text-rose-700' : 'text-indigo-700'" @click="openChart(row.ticker)" x-text="displayTicker(row.ticker)"></a>
                <span class="text-slate-600 truncate flex-1" x-text="shortName(row.name)"></span>
                <span class="shrink-0" x-html="sparklineSvg(row.sparkline, 50, 16, market === 'jp' ? '#e11d48' : '#6366f1')"></span>
              </div>
              <span class="num font-bold ml-2 shrink-0" :class="market === 'jp' ? 'text-rose-700' : 'text-indigo-700'" x-text="fmtPct(row.value)"></span>
            </div>
          </template>
        </div>
      </details>
    </section>

    <!-- Section 3: Market summary -->
    <section x-show="data.market_summary">
      <h2 class="flex items-center gap-3 text-xl sm:text-2xl font-bold text-slate-800 mb-4">
        <span class="inline-block w-1.5 h-7 rounded" :class="market === 'jp' ? 'bg-rose-600' : 'bg-indigo-600'"></span>
        本日の市場サマリー
      </h2>
      <article class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 text-sm leading-relaxed whitespace-pre-line" x-text="data.market_summary"></article>
    </section>

    <!-- Section 4: Full sortable table -->
    <section>
      <h2 class="flex items-center gap-3 text-xl sm:text-2xl font-bold text-slate-800 mb-4">
        <span class="inline-block w-1.5 h-7 rounded" :class="market === 'jp' ? 'bg-rose-600' : 'bg-indigo-600'"></span>
        全銘柄ランキング
      </h2>
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-3">
        <div class="flex flex-wrap items-center gap-3 text-sm">
          <input type="search" x-model="search" placeholder="ティッカー / 銘柄名で検索..." class="flex-1 min-w-[200px] px-3 py-2 border border-slate-300 rounded-lg focus:outline-none" :class="market === 'jp' ? 'focus:ring-2 focus:ring-rose-500' : 'focus:ring-2 focus:ring-indigo-500'" />
          <div class="flex items-center gap-2">
            <label class="text-slate-600">並び替え:</label>
            <select x-model="sortKey" class="px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2" :class="market === 'jp' ? 'focus:ring-rose-500' : 'focus:ring-indigo-500'">
              <template x-if="market === 'us'"><option value="market_cap">時価総額</option></template>
              <option value="daily">本日リターン</option>
              <option value="w1">1週間リターン</option>
              <option value="m1">1ヶ月リターン</option>
              <option value="m3">3ヶ月リターン</option>
              <option value="m12_1">12-1モメンタム</option>
            </select>
            <button @click="sortDesc = !sortDesc" class="px-3 py-2 border border-slate-300 rounded-lg hover:bg-slate-50" x-text="sortDesc ? '降順 ↓' : '昇順 ↑'"></button>
          </div>
          <div class="text-slate-500 text-xs">
            <span x-text="filtered.length.toLocaleString()"></span> / <span x-text="data.all_tickers.length.toLocaleString()"></span> 銘柄
          </div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100 text-slate-700 text-xs uppercase tracking-wider">
              <tr>
                <th class="px-3 py-3 text-left">#</th>
                <th class="px-3 py-3 text-left">Ticker</th>
                <th class="px-3 py-3 text-left">銘柄名</th>
                <th class="px-2 py-3 text-center whitespace-nowrap">1M推移</th>
                <th class="px-3 py-3 text-right"><span x-text="'終値 (' + (data.currency_symbol || '$') + ')'"></span></th>
                <template x-if="market === 'us'">
                  <th class="px-3 py-3 text-right">時価総額</th>
                </template>
                <template x-if="market === 'jp'">
                  <th class="px-3 py-3 text-left">業種</th>
                </template>
                <th class="px-3 py-3 text-right">本日</th>
                <th class="px-3 py-3 text-right">1週</th>
                <th class="px-3 py-3 text-right">1ヶ月</th>
                <th class="px-3 py-3 text-right">3ヶ月</th>
                <th class="px-3 py-3 text-right">12-1</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(row, i) in paginated" :key="row.ticker">
                <tr class="border-t border-slate-100 hover:bg-slate-50">
                  <td class="px-3 py-2 text-slate-400 num" x-text="(page * pageSize) + i + 1"></td>
                  <td class="px-3 py-2 font-bold">
                    <a class="ticker-link" :class="market === 'jp' ? 'text-rose-700' : 'text-indigo-700'" @click="openChart(row.ticker)" x-text="displayTicker(row.ticker)"></a>
                  </td>
                  <td class="px-3 py-2 text-slate-700 max-w-xs truncate" :title="row.name" x-text="shortName(row.name)"></td>
                  <td class="px-2 py-2 text-center" x-html="sparklineSvg(row.sparkline, 70, 22, autoSparkColor(row.sparkline))"></td>
                  <td class="px-3 py-2 text-right num text-slate-600" x-text="row.close ? row.close.toLocaleString() : '-'"></td>
                  <template x-if="market === 'us'">
                    <td class="px-3 py-2 text-right num text-slate-600" x-text="fmtMcap(row.market_cap)"></td>
                  </template>
                  <template x-if="market === 'jp'">
                    <td class="px-3 py-2 text-slate-500 text-xs whitespace-nowrap" x-text="row.sector17 || '-'"></td>
                  </template>
                  <td class="px-3 py-2 text-right num font-semibold" :class="pctClass(row.daily)" x-text="fmtPct(row.daily)"></td>
                  <td class="px-3 py-2 text-right num font-semibold" :class="pctClass(row.w1)" x-text="fmtPct(row.w1)"></td>
                  <td class="px-3 py-2 text-right num font-semibold" :class="pctClass(row.m1)" x-text="fmtPct(row.m1)"></td>
                  <td class="px-3 py-2 text-right num font-semibold" :class="pctClass(row.m3)" x-text="fmtPct(row.m3)"></td>
                  <td class="px-3 py-2 text-right num font-semibold" :class="pctClass(row.m12_1)" x-text="fmtPct(row.m12_1)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-t border-slate-200 bg-slate-50 text-sm">
          <button @click="page = Math.max(0, page-1)" :disabled="page === 0" class="px-3 py-1.5 border border-slate-300 rounded bg-white disabled:opacity-40 hover:bg-slate-100">← 前へ</button>
          <span class="text-slate-600">
            <span x-text="page + 1"></span> / <span x-text="totalPages"></span> ページ
          </span>
          <button @click="page = Math.min(totalPages - 1, page+1)" :disabled="page >= totalPages - 1" class="px-3 py-1.5 border border-slate-300 rounded bg-white disabled:opacity-40 hover:bg-slate-100">次へ →</button>
        </div>
      </div>
    </section>

  </div>
  </template>
</main>

<!-- Chart modal (TradingView Advanced Chart Widget) -->
<div x-show="chartTicker" x-cloak x-transition.opacity @keydown.escape.window="closeChart()" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-2 sm:p-4" @click.self="closeChart()">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-slate-50">
      <div class="flex items-center gap-3 min-w-0">
        <span class="font-bold text-lg" :class="market === 'jp' ? 'text-rose-700' : 'text-indigo-700'" x-text="chartTicker ? displayTicker(chartTicker) : ''"></span>
        <span class="text-slate-600 truncate" x-text="chartTickerName"></span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <a :href="tradingViewExternalUrl" target="_blank" rel="noopener" class="text-xs text-slate-500 hover:text-slate-900 underline">外部で開く ↗</a>
        <button @click="closeChart()" class="text-slate-500 hover:text-slate-900 text-2xl leading-none px-2" aria-label="閉じる">✕</button>
      </div>
    </div>
    <!-- JP-only chart range buttons -->
    <div x-show="chartTicker && market === 'jp'" class="flex items-center gap-1 px-3 py-2 border-b border-slate-200 bg-slate-50 text-xs flex-wrap">
      <span class="text-slate-500 mr-2">期間:</span>
      <template x-for="opt in rangeOptions" :key="opt.days">
        <button @click="setChartRange(opt.days)" :class="chartRange === opt.days ? 'bg-rose-600 text-white border-rose-600' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'" class="px-3 py-1 border rounded font-semibold" x-text="opt.label"></button>
      </template>
      <span class="ml-auto text-slate-500 text-xs">
        <span x-text="chartLoading ? 'チャート読込中…' : ''"></span>
      </span>
    </div>
    <!-- Main chart -->
    <div x-show="chartTicker" class="flex-1 w-full relative">
      <div id="tv-chart-container" class="absolute inset-0"></div>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
const MARKET_CONFIG = {
  us: {
    file: 'momentum_us.json',
    title: 'ラッセル3000 モメンタムランキング',
    label: 'DAILY RUSSELL 3000 MOMENTUM REPORT',
    docTitle: 'ラッセル3000 モメンタムランキング | Daily Russell 3000 Momentum Report',
    defaultSort: 'market_cap',
  },
  jp: {
    file: 'momentum_jp.json',
    title: '東証プライム モメンタムランキング',
    label: 'DAILY TSE PRIME MOMENTUM REPORT',
    docTitle: '東証プライム モメンタムランキング | Daily TSE Prime Momentum Report',
    defaultSort: 'm3',
  },
};

function momentumApp() {
  return {
    market: 'us',
    data: null,
    loading: true,
    search: '',
    sortKey: 'market_cap',
    sortDesc: true,
    page: 0,
    pageSize: 50,
    periodPanels: [
      { key: 'mom_3m_top10', label: '3ヶ月', bg: 'bg-blue-50',    border: 'border-blue-200',    text: 'text-blue-700',    dot: 'bg-blue-500',    divider: 'border-blue-100',    sparkColor: '#2563eb' },
      { key: 'mom_1m_top10', label: '1ヶ月', bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-700', dot: 'bg-emerald-500', divider: 'border-emerald-100', sparkColor: '#059669' },
      { key: 'mom_1w_top10', label: '1週間', bg: 'bg-amber-50',   border: 'border-amber-200',   text: 'text-amber-700',   dot: 'bg-amber-500',   divider: 'border-amber-100',   sparkColor: '#d97706' },
    ],
    chartTicker: null,

    get config() { return MARKET_CONFIG[this.market]; },

    init() {
      // Pick market from URL hash > localStorage > default 'us'
      const hash = (location.hash || '').replace('#', '').toLowerCase();
      let m = MARKET_CONFIG[hash] ? hash : (localStorage.getItem('market') || 'us');
      if (!MARKET_CONFIG[m]) m = 'us';
      this.setMarket(m, /*replaceUrl=*/true);

      window.addEventListener('hashchange', () => {
        const h = (location.hash || '').replace('#', '').toLowerCase();
        if (MARKET_CONFIG[h] && h !== this.market) this.setMarket(h, true);
      });
    },

    setMarket(m, replaceUrl) {
      if (!MARKET_CONFIG[m]) return;
      this.market = m;
      this.sortKey = MARKET_CONFIG[m].defaultSort;
      this.page = 0;
      this.search = '';
      document.title = MARKET_CONFIG[m].docTitle;
      try { localStorage.setItem('market', m); } catch (e) {}
      if (!replaceUrl) location.hash = m;
      else if (location.hash !== '#' + m) history.replaceState(null, '', '#' + m);
      this.load();
    },

    async load() {
      this.loading = true;
      this.data = null;
      try {
        const url = './data/' + this.config.file + '?v=' + Date.now();
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('fetch failed: ' + resp.status);
        this.data = await resp.json();
      } catch (e) {
        console.error(e);
        document.querySelector('main').innerHTML = '<div class="text-center py-20 text-red-600">データの読み込みに失敗しました: ' + e.message + '</div>';
      } finally {
        this.loading = false;
      }
    },

    get filtered() {
      if (!this.data) return [];
      const q = this.search.trim().toLowerCase();
      let list = this.data.all_tickers;
      if (q) {
        list = list.filter(r =>
          r.ticker.toLowerCase().includes(q) ||
          (r.name || '').toLowerCase().includes(q) ||
          (r.code || '').toLowerCase().includes(q)
        );
      }
      const key = this.sortKey;
      const dir = this.sortDesc ? -1 : 1;
      return [...list].sort((a, b) => {
        const av = a[key], bv = b[key];
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return (av - bv) * dir;
      });
    },

    get totalPages() { return Math.max(1, Math.ceil(this.filtered.length / this.pageSize)); },
    get paginated() {
      const start = this.page * this.pageSize;
      return this.filtered.slice(start, start + this.pageSize);
    },

    displayTicker(t) {
      // JP tickers come as "7203.T"; show as "7203"
      if (this.market === 'jp' && t && t.endsWith('.T')) return t.slice(0, -2);
      return t;
    },

    formatDate(iso) {
      if (!iso) return '...';
      const [y, m, d] = iso.split('-');
      const date = new Date(+y, +m - 1, +d);
      const wd = ['日','月','火','水','木','金','土'][date.getDay()];
      return `${y}年${m}月${d}日(${wd})`;
    },

    fmtPct(v) {
      if (v == null) return '-';
      const sign = v > 0 ? '+' : '';
      return `${sign}${v.toFixed(2)}%`;
    },

    pctClass(v) {
      if (v == null) return 'text-slate-400';
      if (v > 0) return 'text-green-600';
      if (v < 0) return 'text-red-600';
      return 'text-slate-600';
    },

    fmtMcap(v) {
      if (!v) return '-';
      if (v >= 1e12) return (v / 1e12).toFixed(2) + 'T';
      if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
      if (v >= 1e6) return (v / 1e6).toFixed(0) + 'M';
      return v.toLocaleString();
    },

    sparklineSvg(prices, width, height, strokeColor) {
      if (!prices || prices.length < 2) return '';
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;
      const padY = 1;
      const stepX = (width - 2) / (prices.length - 1);
      const points = prices.map((p, i) => {
        const x = (1 + i * stepX).toFixed(1);
        const y = (padY + (height - padY * 2) * (1 - (p - min) / range)).toFixed(1);
        return `${x},${y}`;
      }).join(' ');
      const color = strokeColor || (prices[prices.length - 1] >= prices[0] ? '#16a34a' : '#dc2626');
      // Fill polygon (subtle area) + stroke polyline
      const last = `${(1 + (prices.length - 1) * stepX).toFixed(1)},${height}`;
      const first = `1,${height}`;
      const areaPoints = `${first} ${points} ${last}`;
      return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="inline-block align-middle">
        <polygon points="${areaPoints}" fill="${color}" fill-opacity="0.10"/>
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>`;
    },

    autoSparkColor(prices) {
      if (!prices || prices.length < 2) return '#94a3b8';
      return prices[prices.length - 1] >= prices[0] ? '#16a34a' : '#dc2626';
    },

    _lwChart: null,
    _lwSeries: null,
    _lwVolumeSeries: null,
    _lwSma20: null,
    _lwSma50: null,
    _chartDataCache: null,
    chartLoading: false,
    chartRange: 63,
    rangeOptions: [
      { days: 21,  label: '1ヶ月' },
      { days: 63,  label: '3ヶ月' },
      { days: 126, label: '半年' },
    ],

    openChart(ticker) {
      this.chartTicker = ticker;
      this.$nextTick(() => this.renderChart());
    },

    closeChart() {
      if (this._lwChart) {
        try { this._lwChart.remove(); } catch(e) {}
        this._lwChart = null;
        this._lwSeries = null;
      }
      this.chartTicker = null;
    },

    renderChart() {
      // JP: render via TradingView Lightweight Charts using our self-fetched data
      // (TradingView's free embed widget lacks JP data licensing).
      // US: render via TradingView Advanced Chart Widget (works for US tickers).
      if (this.market === 'jp') {
        this.renderLightweightChart();
      } else {
        this.renderTradingViewWidget();
      }
    },

    renderTradingViewWidget() {
      const container = document.getElementById('tv-chart-container');
      if (!container || !this.chartTicker) return;
      // Destroy any prior LWC chart
      if (this._lwChart) { try { this._lwChart.remove(); } catch(e){} this._lwChart = null; this._lwSeries = null; }
      container.innerHTML = '';
      if (typeof TradingView === 'undefined' || !TradingView.widget) {
        setTimeout(() => this.renderTradingViewWidget(), 250);
        return;
      }
      const innerId = 'tv-chart-inner-' + Date.now();
      const inner = document.createElement('div');
      inner.id = innerId;
      inner.style.width = '100%';
      inner.style.height = '100%';
      container.appendChild(inner);
      new TradingView.widget({
        autosize: true,
        symbol: this.tradingViewSymbol,
        interval: 'D',
        timezone: 'Asia/Tokyo',
        theme: 'light',
        style: '1',
        locale: 'ja',
        toolbar_bg: '#f1f3f6',
        enable_publishing: false,
        withdateranges: true,
        hide_side_toolbar: false,
        allow_symbol_change: false,
        save_image: true,
        studies: ['MASimple@tv-basicstudies'],
        container_id: innerId,
      });
    },

    setChartRange(days) {
      this.chartRange = days;
      this.renderLightweightChart();
    },

    sma(closes, period) {
      const out = [];
      for (let i = 0; i < closes.length; i++) {
        if (i >= period - 1) {
          let sum = 0;
          for (let j = i - period + 1; j <= i; j++) sum += closes[j];
          out.push(+(sum / period).toFixed(2));
        } else {
          out.push(null);
        }
      }
      return out;
    },

    async _ensureChartData() {
      if (this._chartDataCache) return this._chartDataCache;
      this.chartLoading = true;
      try {
        const resp = await fetch('./data/chart_data_jp.json?v=' + (this.data?.asof || ''));
        if (!resp.ok) throw new Error('chart_data_jp fetch failed: ' + resp.status);
        this._chartDataCache = await resp.json();
        return this._chartDataCache;
      } finally {
        this.chartLoading = false;
      }
    },

    async renderLightweightChart() {
      const container = document.getElementById('tv-chart-container');
      if (!container || !this.chartTicker) return;
      if (typeof LightweightCharts === 'undefined') {
        setTimeout(() => this.renderLightweightChart(), 250);
        return;
      }
      // Show loading state immediately
      container.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500">チャート読込中…</div>';

      let dataset;
      try {
        dataset = await this._ensureChartData();
      } catch (e) {
        container.innerHTML = '<div class="flex items-center justify-center h-full text-red-600 p-8 text-center">チャートデータの読込に失敗しました。<br>「外部で開く ↗」から TradingView でご確認ください。</div>';
        return;
      }
      const fullHistory = dataset[this.chartTicker] || [];
      if (!fullHistory.length) {
        container.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500 p-8 text-center">この銘柄のチャートデータがありません。<br>「外部で開く ↗」から TradingView でご確認ください。</div>';
        return;
      }

      // Slice to selected range. Rows are [date, O, H, L, C, V] or [date, C].
      const history = fullHistory.slice(-Math.max(this.chartRange, 5));
      const hasOhlc = Array.isArray(history[0]) && history[0].length >= 6;

      // Compute SMAs on close prices
      const closes = history.map(r => hasOhlc ? r[4] : r[1]);
      const dates  = history.map(r => r[0]);
      const sma20 = this.sma(closes, 20);
      const sma50 = this.sma(closes, 50);

      container.innerHTML = '';
      const chart = LightweightCharts.createChart(container, {
        layout: { background: { color: '#ffffff' }, textColor: '#334155', fontFamily: 'Inter, Noto Sans JP, sans-serif' },
        grid: { vertLines: { color: '#f1f5f9' }, horzLines: { color: '#f1f5f9' } },
        rightPriceScale: { borderColor: '#e2e8f0', scaleMargins: { top: 0.08, bottom: 0.28 } },
        timeScale: { borderColor: '#e2e8f0', timeVisible: false, secondsVisible: false, rightOffset: 4 },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        localization: { locale: 'ja-JP' },
        autoSize: true,
      });

      // Main price series: candlesticks if OHLC available, otherwise line
      let priceSeries;
      if (hasOhlc) {
        priceSeries = chart.addCandlestickSeries({
          upColor: '#16a34a', borderUpColor: '#16a34a', wickUpColor: '#16a34a',
          downColor: '#dc2626', borderDownColor: '#dc2626', wickDownColor: '#dc2626',
        });
        priceSeries.setData(history.map(r => ({ time: r[0], open: r[1], high: r[2], low: r[3], close: r[4] })));
      } else {
        priceSeries = chart.addAreaSeries({
          lineColor: '#e11d48',
          topColor: 'rgba(225, 29, 72, 0.25)',
          bottomColor: 'rgba(225, 29, 72, 0.02)',
          lineWidth: 2,
        });
        priceSeries.setData(history.map(r => ({ time: r[0], value: r[1] })));
      }

      // Moving averages
      const sma20Series = chart.addLineSeries({ color: '#2563eb', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: true, title: 'SMA20' });
      sma20Series.setData(dates.map((d, i) => sma20[i] != null ? { time: d, value: sma20[i] } : null).filter(Boolean));
      const sma50Series = chart.addLineSeries({ color: '#f59e0b', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: true, title: 'SMA50' });
      sma50Series.setData(dates.map((d, i) => sma50[i] != null ? { time: d, value: sma50[i] } : null).filter(Boolean));

      // Volume pane at bottom (if available)
      if (hasOhlc) {
        const volumeSeries = chart.addHistogramSeries({
          color: 'rgba(99, 102, 241, 0.5)',
          priceFormat: { type: 'volume' },
          priceScaleId: '',
          scaleMargins: { top: 0.78, bottom: 0 },
        });
        volumeSeries.setData(history.map(r => ({
          time: r[0],
          value: r[5] || 0,
          color: r[4] >= r[1] ? 'rgba(22, 163, 74, 0.45)' : 'rgba(220, 38, 38, 0.45)',
        })));
        this._lwVolumeSeries = volumeSeries;
      }

      chart.timeScale().fitContent();
      this._lwChart = chart;
      this._lwSeries = priceSeries;
      this._lwSma20 = sma20Series;
      this._lwSma50 = sma50Series;
    },

    get chartTickerRow() {
      if (!this.chartTicker || !this.data) return null;
      return this.data.all_tickers.find(r => r.ticker === this.chartTicker) || null;
    },

    get chartTickerName() {
      const r = this.chartTickerRow;
      return r ? this.shortName(r.name) : '';
    },

    get tradingViewSymbol() {
      if (!this.chartTicker) return '';
      if (this.market === 'jp') {
        return 'TSE:' + this.chartTicker.replace(/\.T$/, '');
      }
      const row = this.chartTickerRow;
      const ex = (row?.exchange || 'NASDAQ').toUpperCase();
      // TradingView uses AMEX for NYSE American
      return ex + ':' + this.chartTicker;
    },

    get symbolInfoWidgetUrl() {
      if (!this.chartTicker) return '';
      const config = {
        symbol: this.tradingViewSymbol,
        width: '100%',
        locale: 'ja',
        colorTheme: 'light',
        isTransparent: false,
        largeChartUrl: '',
      };
      return 'https://s.tradingview.com/embed-widget/symbol-info/?locale=ja#' + encodeURIComponent(JSON.stringify(config));
    },

    get tradingViewEmbedUrl() {
      if (!this.chartTicker) return '';
      const params = new URLSearchParams({
        frameElementId: 'tv-chart',
        symbol: this.tradingViewSymbol,
        interval: 'D',
        theme: 'light',
        style: '1',
        timezone: 'Asia/Tokyo',
        locale: 'ja',
        hide_side_toolbar: '0',
        save_image: '1',
        studies: 'MASimple@tv-basicstudies',
        withdateranges: '1',
      });
      return 'https://s.tradingview.com/widgetembed/?' + params.toString();
    },

    get tradingViewExternalUrl() {
      if (!this.chartTicker) return '#';
      return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(this.tradingViewSymbol);
    },

    shortName(name) {
      if (!name) return '';
      // US-side cleanup
      let n = name
        .replace(' Common Stock', '')
        .replace(' Ordinary Shares', '')
        .replace(' Class A', ' A')
        .replace(' Class C', ' C')
        .replace(' Capital Stock', '');
      // JP-side cleanup (drop ホールディングス etc)
      if (this.market === 'jp') {
        n = n
          .replace(/ホールディングス$/, 'HD')
          .replace(/グループ$/, 'G')
          .replace(/株式会社/, '');
      }
      return n;
    },
  };
}
</script>
